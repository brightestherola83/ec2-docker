<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#2563eb,#06b6d4);
        }

        .card{
            width:380px;
            background:white;
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.25);
        }

        h1{
            color:#0f172a;
            margin-bottom:15px;
            font-size:32px;
        }

        p{
            color:#555;
            line-height:1.6;
            margin-bottom:30px;
        }

        button{
            padding:14px 35px;
            border:none;
            border-radius:50px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#1d4ed8;
            transform:scale(1.05);
        }

        footer{
            margin-top:30px;
            color:#888;
            font-size:13px;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Welcome 👋</h1>

    <p>
        Your HTML page is working successfully.
        Start building your amazing website from here.
    </p>

    <button onclick="showMessage()">
        Get Started
    </button>

    <footer>
        Designed with ❤️ using HTML & CSS
    </footer>
</div>

<script>
function showMessage(){
    alert("Congratulations! Your website is running successfully.");
}
</script>

</body>
</html>
